name: Deniz Gizem Rotam V10 SON APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "ana" ]
    paths:
      - "deniz_gizem_rotam_v10_guncel.zip"
      - ".github/workflows/android-apk-v10-son.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: V10 kaynak paketini hazırla
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="deniz_gizem_rotam_v10_guncel.zip"
          if [ ! -f "$ZIP_FILE" ]; then
            ZIP_FILE="$(find . -maxdepth 1 -type f -iname '*v10*.zip' | head -n 1 || true)"
          fi

          if [ -z "$ZIP_FILE" ] || [ ! -f "$ZIP_FILE" ]; then
            echo "HATA: Ana klasörde V10 kaynak ZIP dosyası bulunamadı."
            find . -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          fi

          rm -rf project
          mkdir -p project
          unzip -q "$ZIP_FILE" -d project

          APP_GRADLE="$(find project -type f -path '*/app/build.gradle' | head -n 1 || true)"
          if [ -z "$APP_GRADLE" ]; then
            echo "HATA: ZIP içinde app/build.gradle bulunamadı."
            exit 1
          fi

          APP_DIR="$(dirname "$APP_GRADLE")"
          PROJECT_DIR="$(dirname "$APP_DIR")"
          MAIN_FILE="$(find "$APP_DIR/src/main/java" -type f -name 'MainActivity.java' | head -n 1 || true)"

          if [ -z "$MAIN_FILE" ] || ! grep -Fq "V10" "$MAIN_FILE"; then
            echo "HATA: Yüklenen ZIP geçerli V10 kaynak paketi değil."
            exit 1
          fi

          if grep -RInE 'ACTION_VIEW|startActivity\(|google\.com/search|maps\.google|geo:|yandex|waze|WebView|CustomTabs' "$APP_DIR/src/main/java" "$APP_DIR/src/main/res"; then
            echo "HATA: Harici yönlendirme kodu bulundu."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "APK_PATH=$APP_DIR/build/outputs/apk/release/app-release.apk" >> "$GITHUB_ENV"
          echo "V10 kaynak kontrolü başarılı."

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK komutlarını kur
        uses: android-actions/setup-android@v4

      - name: Android SDK 35 hazırla
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.7 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: İmzalı V10 APK oluştur
        shell: bash
        run: |
          set -euo pipefail
          gradle -p "$PROJECT_DIR" assembleRelease --stacktrace --no-daemon

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: DenizGizemRotam-V10-SON-APK
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
