name: Deniz Gizem Rotam Sifirdan V8

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 8.7 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: V8 kaynak paketini ac
        shell: bash
        run: |
          set -euo pipefail
          test -f deniz_gizem_rotam_sifirdan_v8.zip
          rm -rf project
          mkdir project
          unzip -q deniz_gizem_rotam_sifirdan_v8.zip -d project

      - name: APK olustur
        shell: bash
        run: |
          set -euo pipefail
          chmod +x project/gradlew
          cd project
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: APK dosyasini yukle
        uses: actions/upload-artifact@v4
        with:
          name: DenizGizemRotam-Sifirdan-V8-APK
          path: project/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
