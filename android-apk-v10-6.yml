name: Deniz Gizem Rotam V10.6 APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "ana" ]
    paths:
      - "deniz_gizem_rotam_v10_6_efsane_rivayet_fix.zip"
      - ".github/workflows/android-apk-v10-6.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: V10.6 kaynak paketini hazırla
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="deniz_gizem_rotam_v10_6_efsane_rivayet_fix.zip"
          test -f "$ZIP_FILE"
          rm -rf project
          mkdir -p project
          unzip -q "$ZIP_FILE" -d project
          test -f project/app/build.gradle
          test -f project/app/src/main/java/com/denizgizem/rotam/MainActivity.java
          test -f project/app/src/main/java/com/denizgizem/rotam/DataRepository.java
          grep -Fq "V10.6 • EFSANE + RİVAYET + TÜM YAKIN YERLER" project/app/src/main/java/com/denizgizem/rotam/MainActivity.java
          grep -Fq "searchRegionalNarratives" project/app/src/main/java/com/denizgizem/rotam/DataRepository.java
          grep -Fq "Efsane / rivayet / söylence" project/app/src/main/java/com/denizgizem/rotam/MainActivity.java
          grep -Fq "category == Models.Category.FOOD ? 2 : 100" project/app/src/main/java/com/denizgizem/rotam/DataRepository.java
          grep -Fq "versionCode 16" project/app/build.gradle
          grep -Fq "versionName '10.6'" project/app/build.gradle
          if grep -RInE "ACTION_VIEW|startActivity\(|google\.com/search|maps\.google|geo:|yandex|waze|WebView|CustomTabs" project/app/src/main/java project/app/src/main/res; then
            echo "Harici yönlendirme kodu bulundu; derleme durduruldu."
            exit 1
          fi

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK komutlarını kur
        uses: android-actions/setup-android@v4

      - name: Android SDK 35 hazırla
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.7 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: İmzalı V10.6 APK oluştur
        shell: bash
        run: |
          set -euo pipefail
          gradle -p project clean assembleRelease --no-daemon --stacktrace

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: DenizGizemRotam-V10-6-EFSANE-RIVAYET-APK
          path: project/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
